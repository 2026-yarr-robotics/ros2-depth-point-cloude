/**:
  ros__parameters:
    camera_frame: camera_color_optical_frame
    world_frame: world
    depth_unit: 0.001  # RealSense aligned_depth_to_color is uint16 mm
    # Floor-patch sampling (world_origin_node floor mode + point_cloud_node debug box)
    window_radius: 30
    window_center_x_px: 640
    window_center_y_px: 600

world_origin_node:
  ros__parameters:
    # ── Mode: aruco (default) | floor (legacy depth plane fit) ────────────
    world_origin_mode: aruco

    # ── ArUco mode ─────────────────────────────────────────────────────────
    color_topic: /camera/camera/color/image_raw
    world_marker_id: 0
    world_marker_dict: DICT_4X4_50        # 4x4 marker dict; only ID 0 used
    world_marker_length_m: 0.10           # marker side length (m) — MEASURE AND SET
    world_marker_samples_required: 30     # detection frames to average
    world_marker_reproj_err_max_px: 2.0   # solvePnP reprojection error limit (px)
    world_marker_timeout_s: 15.0          # fallback to floor after this many seconds
    aruco_timeout_then_floor: true

    # Marker position in the ROBOT BASE frame (metres, measured physically).
    world_marker_offset_x_m: 0.367
    world_marker_offset_y_m: 0.003
    world_marker_offset_z_m: 0.0         # height of marker surface in base frame

    # Marker frame orientation relative to BASE frame (Euler intrinsic XYZ, deg).
    # For a flat marker (normal = base +Z), only rot_z_deg matters — it rotates
    # the marker's pattern-top direction to align with base +Y in RViz.
    world_marker_rot_x_deg: 0.0
    world_marker_rot_y_deg: 0.0
    world_marker_rot_z_deg: -90.0

    # ── Floor fallback params ──────────────────────────────────────────────
    depth_topic: /camera/camera/aligned_depth_to_color/image_raw
    min_patch_points: 100
    max_plane_residual: 0.1
    samples_required: 10

detection_node:
  ros__parameters:
    model: /home/eunwoosong/Projects/ros2-depth-point-cloude/vision/yolo/yolo26m-seg-best.pt
    target_classes: ["cup"]
    confidence: 0.35
    image_topic: /camera/camera/color/image_raw
    detections_topic: /digital_twin/detections
    debug_topic: /digital_twin/detection_debug
    device: ""
    imgsz: 1280

point_cloud_node:
  ros__parameters:
    rgb_topic: /camera/camera/color/image_raw
    depth_topic: /camera/camera/aligned_depth_to_color/image_raw
    detections_topic: /digital_twin/detections
    points_topic: /digital_twin/points
    boxes_topic: /digital_twin/boxes
    box_debug_topic: /digital_twin/box_debug
    downsample: 2
    z_min: 0.1
    z_max: 4.0
    box_line_width: 0.0015
    box_alpha: 0.25
    box_standing_ratio: 0.8
    box_min_elongation: 1.5
    box_force_aabb: false
    mask_erode_px: 13
    depth_gradient_max_m: 0.015
    box_outlier_mad_k: 3.0
    approx_sync_slop: 0.05

    # ----- Cup model (Speed Stack truncated cone, standing only) -----
    cup_top_diameter_m: 0.054
    cup_bottom_diameter_m: 0.078
    cup_height_m: 0.095
    cup_polygon_segments: 24
    cup_smoothing_alpha: 0.3
    cup_track_keepalive_frames: 10
    cup_fit_residual_max: 0.02

    # ----- Accumulating-window pipeline -----
    window_period_s: 0.1

    # ----- ArUco marker axes overlay on box_debug -----
    aruco_overlay: true
    world_marker_length_m: 0.05         # must match world_origin_node value
